<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>美食 AI — 智能食谱助手</title>
  <script>
    // Lightweight Markdown renderer (no external dependencies)
    const marked = {
      parse(src) {
        // Fenced code blocks
        src = src.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) =>
          `<pre><code>${escHtml(code.trim())}</code></pre>`);
        const lines = src.split('\n');
        let html = '';
        let inUl = false, inOl = false;

        const closeList = () => {
          if (inUl) { html += '</ul>'; inUl = false; }
          if (inOl) { html += '</ol>'; inOl = false; }
        };

        for (let i = 0; i < lines.length; i++) {
          let line = lines[i];
          // Headings
          if (/^### (.+)/.test(line)) { closeList(); html += `<h3>${inline(line.slice(4))}</h3>`; continue; }
          if (/^## (.+)/.test(line))  { closeList(); html += `<h2>${inline(line.slice(3))}</h2>`; continue; }
          if (/^# (.+)/.test(line))   { closeList(); html += `<h1>${inline(line.slice(2))}</h1>`; continue; }
          // HR
          if (/^---+$/.test(line.trim())) { closeList(); html += '<hr>'; continue; }
          // Unordered list
          const ulMatch = line.match(/^[*\-] (.+)/);
          if (ulMatch) { if (!inUl) { closeList(); html += '<ul>'; inUl = true; } html += `<li>${inline(ulMatch[1])}</li>`; continue; }
          // Ordered list
          const olMatch = line.match(/^\d+\. (.+)/);
          if (olMatch) { if (!inOl) { closeList(); html += '<ol>'; inOl = true; } html += `<li>${inline(olMatch[1])}</li>`; continue; }
          // Blank line
          if (line.trim() === '') { closeList(); html += '<br>'; continue; }
          // Paragraph
          closeList();
          html += `<p>${inline(line)}</p>`;
        }
        closeList();
        return html;
      }
    };

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function inline(s) {
      // Bold + italic
      s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      // Bold
      s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Italic
      s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // Inline code
      s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);
      return s;
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #fff8f0 0%, #fff3e0 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(90deg, #ff6b35 0%, #f7931e 100%);
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(255,107,53,0.3);
    }
    header .logo { font-size: 32px; }
    header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
    header p  { font-size: 13px; opacity: 0.9; margin-top: 2px; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 16px 0;
      gap: 16px;
    }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 8px;
      max-height: calc(100vh - 220px);
    }

    .bubble-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .bubble-row.user  { flex-direction: row-reverse; }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .avatar.ai   { background: linear-gradient(135deg, #ff6b35, #f7931e); }
    .avatar.user { background: #e0e0e0; }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.7;
      font-size: 15px;
      word-break: break-word;
    }
    .bubble.ai {
      background: #fff;
      border: 1px solid #ffe0cc;
      border-top-left-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }
    .bubble.user {
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      color: #fff;
      border-top-right-radius: 4px;
    }

    /* Markdown 样式 */
    .bubble.ai h1, .bubble.ai h2, .bubble.ai h3 {
      margin: 12px 0 6px;
      color: #d9440b;
    }
    .bubble.ai ul, .bubble.ai ol { padding-left: 20px; margin: 6px 0; }
    .bubble.ai li { margin: 4px 0; }
    .bubble.ai p  { margin: 6px 0; }
    .bubble.ai strong { color: #c0390a; }
    .bubble.ai code {
      background: #fff3e0;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 13px;
    }
    .bubble.ai hr { border: none; border-top: 1px solid #ffe0cc; margin: 10px 0; }

    .typing-indicator span {
      display: inline-block;
      width: 8px; height: 8px;
      background: #ff6b35;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-8px); }
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px 0;
    }
    .suggestion-btn {
      background: #fff;
      border: 1px solid #ffb088;
      color: #d9440b;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .suggestion-btn:hover {
      background: #ff6b35;
      color: #fff;
      border-color: #ff6b35;
    }

    footer {
      background: #fff;
      border-top: 1px solid #ffe0cc;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }
    textarea {
      flex: 1;
      border: 1.5px solid #ffb088;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      max-height: 140px;
      line-height: 1.5;
    }
    textarea:focus { border-color: #ff6b35; }
    #send-btn {
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 22px;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #send-btn:not(:disabled):hover { opacity: 0.9; }
  </style>
</head>
<body>
  <header>
    <div class="logo">🍜</div>
    <div>
      <h1>美食 AI</h1>
      <p>智能食谱助手 — 告诉我你想做什么菜，我来教你！</p>
    </div>
  </header>

  <main>
    <div id="chat-window">
      <!-- 欢迎消息 -->
      <div class="bubble-row ai">
        <div class="avatar ai">🍜</div>
        <div class="bubble ai" id="welcome-bubble">
          👋 你好！我是你的专属美食 AI 助手。<br><br>
          你可以问我任何菜肴的食谱，比如：<br>
          <strong>「红烧肉怎么做？」</strong>、<strong>「教我做宫保鸡丁」</strong>、<strong>「披萨的做法」</strong> ……<br><br>
          试试下面的推荐菜品，或者直接输入你想了解的菜名吧！🥢
        </div>
      </div>
      <div class="bubble-row ai">
        <div class="avatar ai" style="visibility:hidden;">🍜</div>
        <div class="suggestions" id="suggestions">
          <button class="suggestion-btn">🥩 红烧肉</button>
          <button class="suggestion-btn">🍗 宫保鸡丁</button>
          <button class="suggestion-btn">🥘 麻婆豆腐</button>
          <button class="suggestion-btn">🍜 番茄鸡蛋面</button>
          <button class="suggestion-btn">🍣 寿司</button>
          <button class="suggestion-btn">🍕 披萨</button>
          <button class="suggestion-btn">🥗 凯撒沙拉</button>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <textarea id="user-input" rows="1" placeholder="输入菜名或食谱问题，按 Enter 发送…"></textarea>
    <button id="send-btn">发送 ✈️</button>
  </footer>

  <script>
    const chatWindow  = document.getElementById('chat-window');
    const userInput   = document.getElementById('user-input');
    const sendBtn     = document.getElementById('send-btn');
    const suggestions = document.getElementById('suggestions');

    // Limit history to MAX_HISTORY_MESSAGES most recent messages (simple count limit)
    const MAX_HISTORY_MESSAGES = 40;

    let history = [];
    let isStreaming = false;

    // 自动高度调整
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
    });

    // Enter 发送（Shift+Enter 换行）
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    suggestions.addEventListener('click', (e) => {
      const btn = e.target.closest('.suggestion-btn');
      if (!btn) return;
      // Strip leading emoji (food/dining blocks: U+1F300-U+1FAD6, U+1F004-U+1F0CF) and whitespace
      const text = btn.textContent.replace(/^[\u{1F004}-\u{1FAD6}]\s*/u, '').trim();
      userInput.value = text;
      sendMessage();
    });

    function appendBubble(role, html) {
      const row = document.createElement('div');
      row.className = `bubble-row ${role}`;

      const avatar = document.createElement('div');
      avatar.className = `avatar ${role}`;
      avatar.textContent = role === 'ai' ? '🍜' : '🙋';

      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}`;
      bubble.innerHTML = html;

      if (role === 'ai') {
        row.appendChild(avatar);
        row.appendChild(bubble);
      } else {
        row.appendChild(bubble);
        row.appendChild(avatar);
      }

      chatWindow.appendChild(row);
      scrollToBottom();
      return bubble;
    }

    function appendTyping() {
      const row = document.createElement('div');
      row.className = 'bubble-row ai';
      row.id = 'typing-row';

      const avatar = document.createElement('div');
      avatar.className = 'avatar ai';
      avatar.textContent = '🍜';

      const bubble = document.createElement('div');
      bubble.className = 'bubble ai typing-indicator';
      bubble.innerHTML = '<span></span><span></span><span></span>';

      row.appendChild(avatar);
      row.appendChild(bubble);
      chatWindow.appendChild(row);
      scrollToBottom();
      return row;
    }

    function removeTyping() {
      const el = document.getElementById('typing-row');
      if (el) el.remove();
    }

    function scrollToBottom() {
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function sendMessage() {
      if (isStreaming) return;
      const text = userInput.value.trim();
      if (!text) return;

      userInput.value = '';
      userInput.style.height = 'auto';
      sendBtn.disabled = true;
      isStreaming = true;

      appendBubble('user', escapeHtml(text));

      const typingRow = appendTyping();

      let aiText = '';

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history }),
        });

        removeTyping();

        if (!response.ok) {
          const err = await response.json().catch(() => ({ error: `HTTP ${response.status}` }));
          appendBubble('ai', `<span style="color:#e53935">⚠️ ${escapeHtml(err.error || '请求失败')}</span>`);
          return;
        }

        const aiBubble = appendBubble('ai', '');
        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          aiText += decoder.decode(value, { stream: true });
          aiBubble.innerHTML = marked.parse(aiText);
          scrollToBottom();
        }

        history.push({ role: 'user', content: text });
        history.push({ role: 'assistant', content: aiText });
        // 保留最近 20 轮对话
        if (history.length > MAX_HISTORY_MESSAGES) history = history.slice(history.length - MAX_HISTORY_MESSAGES);

      } catch (err) {
        removeTyping();
        appendBubble('ai', `<span style="color:#e53935">⚠️ 网络错误：${escapeHtml(err.message)}</span>`);
      } finally {
        sendBtn.disabled = false;
        isStreaming = false;
        userInput.focus();
      }
    }

    function escapeHtml(str) { return escHtml(str); }
  </script>
</body>
</html>
